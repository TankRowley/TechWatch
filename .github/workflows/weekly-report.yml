name: Weekly TechWatch report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * 0" # Monday 06:00 JST

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test and package
        run: mvn -B test package
      - name: Generate weekly report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: java --enable-native-access=ALL-UNNAMED -jar target/techwatch.jar run-weekly
      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/weekly/*.md
          git diff --cached --quiet || git commit -m "chore: update weekly TechWatch report"
          git push
